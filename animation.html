<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logo Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    /* ── Dark background ── */
    #bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, #151515 0%, #080808 60%, #000 100%);
      z-index: 0;
    }
    .orb {
      position: absolute;
      width: 40vw; height: 40vw;
      border-radius: 50%;
      background: radial-gradient(circle, #D4AF37 0%, transparent 70%);
      opacity: 0.07;
      filter: blur(80px);
      animation: orbFloat 15s ease-in-out infinite;
    }
    @keyframes orbFloat {
      0%   { transform: translate(-20%, 10%) scale(1); }
      50%  { transform: translate(20%, -20%) scale(1.2); }
      100% { transform: translate(-10%, 30%) scale(0.8); }
    }

    /* ── Scenes ── */
    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .scene.active { opacity: 1; pointer-events: auto; }

    /* ── Scene 1: Blur Reveal ── */
    #s1 .logo-box {
      position: relative;
      filter: blur(30px) brightness(0.1);
      transform: scale(0.8);
      transition: filter 2s ease-out, transform 2s ease-out;
    }
    #s1.p1 .logo-box { filter: blur(0px) brightness(1); transform: scale(1); }
    #s1 .logo-box img { width: 22vw; display: block; }

    #s1 .glow-ring {
      position: absolute;
      inset: -16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      opacity: 0;
      transition: opacity 1s 0.5s;
    }
    #s1.p2 .glow-ring { opacity: 1; }

    .sweep {
      position: fixed;
      width: 200%;
      height: 30%;
      background: rgba(255,255,255,0.04);
      filter: blur(40px);
      transform: rotate(-35deg);
      left: -100%;
      top: 30%;
      opacity: 0;
    }
    #s1.p1 .sweep { opacity: 1; animation: doSweep 2.2s ease-in-out forwards; }
    @keyframes doSweep { to { left: 120%; } }

    /* ── Scene 2: Focus ── */
    #s2 .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }
    #s2 .logo-wrap img {
      width: 18vw;
      transform: translateY(30px) scale(0.92);
      filter: drop-shadow(0 0 40px rgba(212,175,55,0.2));
      transition: transform 1.5s cubic-bezier(0.16,1,0.3,1);
    }
    #s2.p1 .logo-wrap img { transform: translateY(0) scale(1); }

    #s2 .txt-sub {
      font-size: clamp(10px, 1.1vw, 16px);
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(14px);
      transition: opacity 0.9s, transform 0.9s;
    }
    #s2.p1 .txt-sub { opacity: 1; transform: translateY(0); }

    #s2 .txt-head {
      font-family: 'Playfair Display', serif;
      font-size: clamp(20px, 3vw, 48px);
      color: #fff;
      opacity: 0;
      filter: blur(8px);
      transform: translateY(16px);
      transition: opacity 1.2s 0.2s, filter 1.2s 0.2s, transform 1.2s 0.2s;
    }
    #s2.p2 .txt-head { opacity: 1; filter: blur(0); transform: translateY(0); }

    /* ── Scene 3: Centered Hero ── */
    #s3 .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }
    #s3 .gold-line {
      width: 1px; height: 10vh;
      background: linear-gradient(to bottom, transparent, #D4AF37, transparent);
      transform: scaleY(0); opacity: 0;
      transition: transform 1s ease-in-out, opacity 1s;
    }
    #s3.p1 .gold-line { transform: scaleY(1); opacity: 1; }

    #s3 .logo-circle {
      width: 16vw;
      padding: 24px;
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(0) rotate(-20deg);
      opacity: 0;
      transition: transform 1.1s cubic-bezier(0.34,1.56,0.64,1) 0.2s, opacity 0.6s 0.2s;
    }
    #s3.p1 .logo-circle { transform: scale(1) rotate(0deg); opacity: 1; }
    #s3 .logo-circle img { width: 100%; }

    #s3 .big-word {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 6vw, 90px);
      color: #fff;
      letter-spacing: 0.06em;
      display: flex;
    }
    #s3 .big-word span {
      display: inline-block;
      opacity: 0;
      transform: translateY(35px);
      transition: opacity 0.5s, transform 0.5s;
    }
    #s3.p2 .big-word span:nth-child(1) { opacity:1; transform:none; transition-delay:0.00s; }
    #s3.p2 .big-word span:nth-child(2) { opacity:1; transform:none; transition-delay:0.07s; }
    #s3.p2 .big-word span:nth-child(3) { opacity:1; transform:none; transition-delay:0.14s; }
    #s3.p2 .big-word span:nth-child(4) { opacity:1; transform:none; transition-delay:0.21s; }
    #s3.p2 .big-word span:nth-child(5) { opacity:1; transform:none; transition-delay:0.28s; }
    #s3.p2 .big-word span:nth-child(6) { opacity:1; transform:none; transition-delay:0.35s; }
    #s3.p2 .big-word span:nth-child(7) { opacity:1; transform:none; transition-delay:0.42s; }

    /* ── Scene 4: Outro ── */
    #s4 {
      background: #000;
      flex-direction: column;
      gap: 24px;
    }
    #s4 img {
      width: 14vw;
      opacity: 0;
      filter: blur(12px) brightness(0.3);
      transform: scale(1.1);
      transition: opacity 1.8s, filter 1.8s, transform 1.8s;
    }
    #s4.p1 img { opacity: 1; filter: blur(0) brightness(1); transform: scale(1); }

    #s4 .tagline {
      font-size: clamp(9px, 1vw, 14px);
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity 1.2s 0.6s;
    }
    #s4.p1 .tagline { opacity: 1; }

    #s4 .leak {
      position: absolute;
      bottom: -10vh; right: -10vw;
      width: 50vw; height: 50vw;
      background: #D4AF37;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.06;
      animation: pulse 7s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:0.06; transform:scale(1); }
      50%      { opacity:0.12; transform:scale(1.15); }
    }

    /* ── Progress bar ── */
    #progress {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(255,255,255,0.08);
      z-index: 100;
    }
    #prog-fill {
      height: 100%;
      background: linear-gradient(to right, #D4AF37, #fff);
      width: 0%;
      transition: none;
    }
  </style>
</head>
<body>

<div id="bg"><div class="orb"></div></div>

<!-- Scene 1: Blur Reveal -->
<div class="scene" id="s1">
  <div class="logo-box">
    <img src="logo.png" alt="Logo" />
    <div class="glow-ring"></div>
  </div>
  <div class="sweep"></div>
</div>

<!-- Scene 2: Focus + Text -->
<div class="scene" id="s2">
  <div class="logo-wrap">
    <img src="logo.png" alt="Logo" />
    <div>
      <p class="txt-sub">Presenting</p>
      <h2 class="txt-head">A New Standard</h2>
    </div>
  </div>
</div>

<!-- Scene 3: Hero Circle -->
<div class="scene" id="s3">
  <div class="hero">
    <div class="gold-line"></div>
    <div class="logo-circle">
      <img src="logo.png" alt="Logo" />
    </div>
    <div class="big-word">
      <span>E</span><span>L</span><span>E</span><span>V</span><span>A</span><span>T</span><span>E</span>
    </div>
  </div>
</div>

<!-- Scene 4: Outro -->
<div class="scene" id="s4">
  <img src="logo.png" alt="Logo" />
  <p class="tagline">Since 2024</p>
  <div class="leak"></div>
</div>

<!-- Progress bar -->
<div id="progress"><div id="prog-fill"></div></div>

<script>
  const SCENES = [
    { id: 's1', dur: 3500, phases: [400, 1400, 2400] },
    { id: 's2', dur: 4000, phases: [300, 1100] },
    { id: 's3', dur: 4500, phases: [400, 1400] },
    { id: 's4', dur: 3500, phases: [300] },
  ];

  const TOTAL = SCENES.reduce((s, x) => s + x.dur, 0);
  let current = 0, phaseTimers = [], sceneTimer = null;
  let elapsed = 0, progStart = null, progRAF = null;

  function setPhase(el, n) {
    el.classList.remove('p1','p2','p3');
    if (n >= 1) el.classList.add('p1');
    if (n >= 2) el.classList.add('p2');
    if (n >= 3) el.classList.add('p3');
  }

  function clearTimers() {
    phaseTimers.forEach(clearTimeout); phaseTimers = [];
    clearTimeout(sceneTimer);
    cancelAnimationFrame(progRAF);
  }

  function animateProgress(startElapsed, dur) {
    progStart = performance.now();
    const fill = document.getElementById('prog-fill');
    function tick() {
      const t = performance.now() - progStart;
      const pct = Math.min(((startElapsed + t) / TOTAL) * 100, 100);
      fill.style.width = pct + '%';
      if (t < dur) progRAF = requestAnimationFrame(tick);
    }
    progRAF = requestAnimationFrame(tick);
  }

  function playScene(index) {
    clearTimers();
    document.querySelectorAll('.scene').forEach(el => {
      el.classList.remove('active','p1','p2','p3');
    });

    const cfg = SCENES[index];
    const el = document.getElementById(cfg.id);
    el.classList.add('active');

    cfg.phases.forEach((delay, pi) => {
      phaseTimers.push(setTimeout(() => setPhase(el, pi + 1), delay));
    });

    const startElapsed = SCENES.slice(0, index).reduce((s, x) => s + x.dur, 0);
    animateProgress(startElapsed, cfg.dur);

    sceneTimer = setTimeout(() => {
      current = (index + 1) % SCENES.length;
      elapsed = current === 0 ? 0 : SCENES.slice(0, current).reduce((s, x) => s + x.dur, 0);
      playScene(current);
    }, cfg.dur);
  }

  playScene(0);
</script>
</body>
</html>
